<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{@class}} - lxweb</title>
  <style>
    :root {
      --bg: #f8fafc;
      --text: #1e293b;
      --card: #fff;
      --border: #e2e8f0;
      --desc: #fca5a5;
      --label: #64748b;
      --code-bg: #f1f5f9;
      --code-b: #e2e8f0;
      --err: #dc2626;
      --link: #2563eb;
      --loc: #94a3b8;
      --num: #94a3b8;
      --hover: #f1f5f9;
      --rb: #e2e8f0;
      --ft: #94a3b8;
      --crash-bg: #fef2f2;
      --crash-border: #fecaca;
      --crash-fn: #991b1b;
      --crash-call: #dc2626;
      --crash-loc: #b91c1c;
      --row-crash: #fef2f2
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --text: #e2e8f0;
      --card: #1e293b;
      --border: #334155;
      --desc: #fecaca;
      --label: #64748b;
      --code-bg: #0f172a;
      --code-b: #334155;
      --err: #fca5a5;
      --link: #38bdf8;
      --loc: #64748b;
      --num: #475569;
      --hover: #1e293b;
      --rb: #334155;
      --ft: #475569;
      --crash-bg: #1c1017;
      --crash-border: #7f1d1d;
      --crash-fn: #fecaca;
      --crash-call: #fca5a5;
      --crash-loc: #f87171;
      --row-crash: #1c1017
    }

    @media(prefers-color-scheme:dark) {
      :root:not([data-theme]) {
        --bg: #0f172a;
        --text: #e2e8f0;
        --card: #1e293b;
        --border: #334155;
        --desc: #fecaca;
        --label: #64748b;
        --code-bg: #0f172a;
        --code-b: #334155;
        --err: #fca5a5;
        --link: #38bdf8;
        --loc: #64748b;
        --num: #475569;
        --hover: #1e293b;
        --rb: #334155;
        --ft: #475569;
        --crash-bg: #1c1017;
        --crash-border: #7f1d1d;
        --crash-fn: #fecaca;
        --crash-call: #fca5a5;
        --crash-loc: #f87171;
        --row-crash: #1c1017
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      min-height: 100vh;
      transition: background .2s, color .2s
    }

    .c {
      max-width: 960px;
      margin: 0 auto
    }

    .h {
      background: #dc2626;
      padding: 1.25rem 1.5rem;
      border-radius: 8px 8px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start
    }

    .h h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff
    }

    .h .desc {
      font-size: .9rem;
      color: var(--desc);
      margin-top: .35rem
    }

    .h .tw {
      flex: 1
    }

    #tb {
      background: rgba(255, 255, 255, .15);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: 1rem;
      transition: background .2s
    }

    #tb:hover {
      background: rgba(255, 255, 255, .25)
    }

    .b {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 0;
      border-radius: 0 0 8px 8px;
      padding: 1.5rem;
      transition: background .2s, border-color .2s
    }

    .s {
      margin-bottom: 1.5rem
    }

    .s:last-child {
      margin-bottom: 0
    }

    .s h2 {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--label);
      margin-bottom: .5rem;
      font-weight: 600
    }

    .ri {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      color: var(--link);
      font-size: .95rem
    }

    .rb {
      background: var(--code-bg);
      border: 1px solid var(--code-b);
      border-radius: 6px;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: .8rem;
      color: var(--err);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 220px;
      overflow-y: auto;
      line-height: 1.5;
      transition: background .2s, border-color .2s
    }

    .crash-section {
      background: var(--crash-bg);
      border: 1px solid var(--crash-border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem
    }

    .crash-section h2 {
      color: var(--crash-fn)
    }

    .crash-fn {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: .25rem
    }

    .crash-mod {
      color: var(--crash-fn)
    }

    .crash-sep {
      color: var(--crash-loc);
      margin: 0 .1rem
    }

    .crash-call {
      color: var(--crash-call);
      font-weight: 700
    }

    .crash-loc {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: .8rem;
      color: var(--crash-loc);
      margin-top: .15rem
    }

    .src-block {
      margin-top: .75rem;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--crash-border)
    }

    .src-line {
      display: flex;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: .75rem;
      line-height: 1.6;
      background: var(--code-bg)
    }

    .src-line .ln {
      display: inline-block;
      min-width: 2.5rem;
      text-align: right;
      padding: 0 .5rem 0 .5rem;
      color: var(--num);
      user-select: none;
      border-right: 1px solid var(--border);
      flex-shrink: 0
    }

    .src-line .lc {
      padding: 0 .75rem;
      white-space: pre;
      overflow-x: auto;
      flex: 1
    }

    .src-line.err-line {
      background: var(--crash-bg)
    }

    .src-line.err-line .lc {
      color: var(--crash-call);
      font-weight: 600
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    th {
      text-align: left;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--label);
      padding: .5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600
    }

    td {
      padding: .45rem .5rem;
      font-size: .8rem;
      border-bottom: 1px solid var(--rb)
    }

    td.n {
      color: var(--num);
      width: 2.5rem;
      text-align: right;
      font-size: .75rem
    }

    td.mfa {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      color: var(--link);
      font-size: .8rem
    }

    td.loc {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      color: var(--loc);
      font-size: .75rem
    }

    tr:hover td {
      background: var(--hover)
    }

    tr.crash-row td {
      background: var(--row-crash);
      font-weight: 600
    }

    tr.crash-row td.mfa {
      color: var(--crash-call)
    }

    .ft {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--rb);
      text-align: center;
      color: var(--ft);
      font-size: .7rem
    }
  </style>
</head>

<body>
  <div class="c">
    <div class="h">
      <div class="tw">
        <h1>{{@class}}</h1>{{render_title_html(@title)}}
      </div>
      <button id="tb" title="Toggle theme"></button>
    </div>
    <div class="b">
      <div class="s">
        <h2>Request</h2>
        <div class="ri">{{@method}} {{@path}}</div>
      </div>
        {{render_crash_section(@crash_html)}}
      <div class="s">
        <h2>Error</h2>
        <div class="rb">{{@reason_html}}</div>
      </div>
      <div class="s">
        <h2>Stack Trace</h2>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Call</th>
              <th>Location</th>
            </tr>
          </thead>
        <tbody>{{@stack_html}}</tbody>
        </table>
      </div>
      <div class="ft">lxweb dev error page</div>
    </div>
  </div>
  <script>!function () { var s = localStorage.getItem('lxweb-theme'), h = document.documentElement, b = document.getElementById('tb'), c = s || 'system'; function a(t) { t === 'system' ? h.removeAttribute('data-theme') : h.setAttribute('data-theme', t); b.textContent = { system: '\u2699', light: '\u2600', dark: '\u263E' }[t] || '\u2699'; b.title = 'Theme: ' + t } a(c); b.onclick = function () { c = ({ system: 'light', light: 'dark', dark: 'system' })[c] || 'system'; localStorage.setItem('lxweb-theme', c); a(c) } }()</script>
</body>

</html>
